r>\n      정체기에 볼륨 늘리지 않고 자극을 늘리는 방법이에요."},{id:"metd",name:"바쁜 주 모드 (미니멀 도즈)",what:"시간 없는 주를 0으로 만들지 않기",theory:"주 2회, 종목당 톱싱글+백오프 한 세트로 근력 유지~소폭 향상(Androulakis-Korakakis 2020 메타분석)",body:"야근·시험 기간엔 이렇게만:<br><br>\n      · 주 2회, 세션 30분<br>\n      · 종목당: <b>무거운 1회</b>(RPE 9, 한계 직전) + <b>85%로 3회×1세트</b><br>\n      · 스쿼트·벤치 하루, 데드·OHP 하루<br><br>\n      2주까지는 이걸로 충분히 버텨요. 0과 30분의 차이가 생각보다 큽니다."},{id:"autoreg",name:"RPE 자동조절 읽는 법",what:"오늘 탭의 RPE 코치 십분 활용",theory:"RPE 기반 조절이 고정 %1RM보다 근력 향상에 우위(Graham & Cleather 2022). 실패 직전 연속은 오히려 손해(Robinson 2024)",body:'기록할 때 적는 RPE가 코치가 됩니다:<br><br>\n      · <b>RPE 9 이상 2세션 연속</b> → 오늘 탭에 증량 보류 카드가 떠요. 따르세요<br>\n      · <b>RPE 7 이하 연속</b> → 증량 여유 신호<br>\n      · 목표 구간은 <b>메인 세트 RPE 7~8</b> — "2~3회 더 할 수 있는데?"가 정답<br><br>\n      매주 한계를 시험하는 게 아니라, 한계 근처를 비켜 가며 쌓는 거예요.'}];function openStrengthAdv(W){const e=STRENGTH_ADV.find(e=>e.id===W);e&&(hasPro("sadv:"+W)?(track("strength_adv",{id:W}),openModal(`\n    <button class="mclose" onclick="closeModal()">×</button>\n    <h3>${e.name}</h3>\n    <p class="sub" style="margin:6px 0 12px">${ic("check",12,"vertical-align:-1.5px;color:var(--primary)")} ${e.theory}</p>\n    <div style="font-size:13.5px;line-height:1.75">${e.body}</div>`)):openPro("sadv:"+W))}function strengthAdvSection(){const W=STRENGTH_ADV.filter(W=>proShown("sadv:"+W.id));return W.length?`<div class="card">\n    <div class="card-title">고급 과정 (바벨 기법) ${isPro()?"":`<span class="chip">${ic("lock",10,"vertical-align:-1px")} 초대</span>`}</div>\n    <p class="sub" style="margin:0 0 6px;font-size:12.5px">5×5가 익숙해진 다음의 기술들이에요. 전부 연구 근거가 달려 있어요.</p>\n    ${W.map(W=>`\n      <div class="acc-row" style="cursor:pointer;padding:10px 0" onclick="openStrengthAdv('${W.id}')">\n        <span class="icb icb-sm">${ic("dumbbell",15)}</span>\n        <span class="acc-name" style="font-weight:700">${W.name}<span style="display:block;font-size:11px;color:var(--muted);font-weight:600;margin-top:2px">${W.what}</span></span>\n        <span style="color:var(--muted)">›</span>\n      </div>`).join("")}\n  </div>`:""}const STRENGTH_ALT=[{id:"next531",name:"다음 단계: 5/3/1 (Wendler)",what:"Madcow 정체 이후의 표준 중급 경로",pro:!1,theory:"주 단위 증량이 막히면 4주 사이클로 천천히 — 중급 진입의 검증된 표준이에요",body:"Madcow에서 리셋을 두 번 이상 했고 1RM이 제자리라면, 졸업할 때예요.<br><br>\n      · <b>TM(트레이닝 맥스)</b> = 1RM의 90%. 모든 무게가 여기서 계산돼요<br>\n      · 4주 사이클: 5의 주 → 3의 주 → 5/3/1의 주 → 디로드<br>\n      · 주 4회, 하루 1개 메인 리프트(오버헤드프레스·데드·벤치·스쿼트) + 보조<br>\n      · 사이클이 끝나면 자동 증량: 상체 +2.5kg · 하체 +5kg<br><br>\n      전환하면 지금 Madcow 기록에서 추정 1RM을 뽑아 TM을 미리 채워줘요. 기존 기록은 그대로예요."},{id:"dumbbell30",name:"덤벨 전신 30분 (주 2~3회)",what:"바벨 줄 서기 싫은 날의 정답",pro:!1,theory:"볼륨이 같으면 주 2회 전신도 분할과 동등한 근성장(빈도 메타분석, Schoenfeld)",body:"덤벨존만 비어 있으면 됩니다. 주 2~3회, 30분.<br><br>\n      ① 고블릿 스쿼트 3×10<br>② 덤벨 로우 3×10 (좌우)<br>③ 플로어 프레스 3×10<br>\n      ④ 루마니안 데드리프트 3×10<br>⑤ 숄더 프레스 3×10<br>⑥ 파머스 캐리 3×30초<br><br>\n      전부 <b>RPE 7~8</b>(2~3회 여유). 다음 주 같은 무게가 쉬워졌으면 한 단계 올리세요."},{id:"machine",name:"머신으로 시작하기 (서킷 입문)",what:"바벨이 무서운 날부터 시작하는 법",pro:!1,theory:"머신도 프리웨이트와 근비대·근력 향상이 동등해요(2023 메타분석). 무서우면 머신부터가 과학적으로도 정답",body:"기구 순서대로 한 바퀴, 2~3회 돌면 끝.<br><br>\n      레그 프레스 → 체스트 프레스 → 랫 풀다운 → 레그 컬 → 숄더 프레스 → 시티드 로우<br><br>\n      · 각 12~15회, 마지막 2회가 살짝 힘든 무게<br>· 기구 사이 휴식 30~60초<br>\n      · 4주쯤 익숙해지면 Madcow 5×5(프로그램 탭)로 넘어올 준비가 된 거예요."},{id:"women8",name:"바벨 입문 8주 (빈 봉부터)",what:"바벨이 처음인 모두의 첫 8주",pro:!1,theory:"입문 선형 진행의 정석이에요. 15kg 빈 봉이면 누구든 시작하기에 충분해요",body:"바벨이 처음이어도 8주면 충분해요.<br><br>\n      · <b>1~2주</b>: 머신 서킷 + 고블릿 스쿼트로 동작 패턴 익히기<br>\n      · <b>3~4주</b>: 빈 봉(15kg)으로 스쿼트·벤치 5×5, RDL은 덤벨로<br>\n      · <b>5~8주</b>: 매주 +2.5kg, 데드리프트 합류<br>\n      · <b>졸업</b>: 3대 클럽(진행 탭)에서 체중 대비 등급 확인. 절대 무게가 아니라 내 비율이 기준이에요<br><br>\n      프리웨이트 존이 낯설면 머신 존에서 시작해도 똑같이 강해져요.\n      빈 봉은 부끄러운 게 아니라 모든 리프터의 첫 페이지입니다."},{id:"glute6",name:"둔근 키우기 6주 (글루트 빌더)",what:"둔근 집중, 주 2회 16세트",pro:!0,theory:"힙 쓰러스트와 스쿼트의 둔근 성장 효과는 동등(Plotkin 2023 RCT). 종목보다 볼륨과 점진이 핵심",body:"주 2회, 둔근 주당 약 16세트.<br><br>\n      · <b>A일</b>: 힙 쓰러스트 4×8 (벤치에 등 대고 바벨) · RDL 3×10 · 불가리안 3×10<br>\n      · <b>B일</b>: 스쿼트 3×8 · 글루트 브리지 3×12 · 카프 레이즈 3×15<br>\n      · 매주 무게나 횟수를 한 단계씩<br><br>\n      집에서 보조: 코펜하겐 프로토콜과 글루트 브리지 행진(홈트 탭).\n      6주 뒤 같은 무게가 가벼우면, 성공한 거예요."},{id:"silver",name:"다시 시작하는 근력 (4050 · 머신)",what:"관절 눈치 안 보는 주 2회 30분",pro:!0,theory:"주 30~60분 근력 운동으로 사망 위험 10~17% 감소(Momma 2022 BJSM). 그 최소량을 머신으로 안전하게",body:"오랜만이라면 기구가 관절을 지켜줍니다.<br><br>\n      · 주 2회 30분: 레그 프레스 3×12 → 체스트 프레스 3×12 → 시티드 로우 3×12 → 레그 컬 2×15 → 파머스 캐리 2번<br>\n      · 규칙: 통증 3/10 이하 + 다음날 악화 없음<br>\n      · 8주 뒤 원하면 프리웨이트(빈 봉)로 전환<br><br>\n      목표는 기록이 아니라 계단이 가벼워지는 거예요. 그건 4주면 느껴집니다."},{id:"powerbuild",name:"힘과 몸 둘 다 (파워빌딩)",what:"Madcow에 보디빌딩 보조 얹기",pro:!0,theory:"메인은 5회 이하로 무겁게, 보조는 8~12회 — 근력과 근비대를 같이 가져가는 표준 배합이에요",body:"Madcow 메인 리프트는 그대로 두고, 보조만 갈아끼우세요.<br><br>\n      · <b>벤치 날</b>: 인클라인 덤벨 프레스 3×10 · 사이드 레터럴 3×12<br>\n      · <b>스쿼트 날</b>: RDL 3×10 · 레그 익스텐션 3×12<br>\n      · <b>금요일</b>: 친업 3×최대 · 덤벨 컬 3×12<br><br>\n      메인이 무거운 날은 보조 한 세트씩 줄이세요. RPE 코치가 9를 두 번 띄우면 보조부터 빼는 겁니다."},{id:"upperlower",name:"상·하체 분할 (주 4회)",what:"시간 여유가 생긴 다음의 선택지",pro:!0,theory:"볼륨이 같으면 분할과 전신의 결과는 같아요. 분할의 진짜 장점은 회당 부담이 줄어드는 것",body:"주 4회 갈 수 있을 때만 의미가 있어요.<br><br>\n      · <b>상체 A</b>: 벤치 4×6, 로우 4×8, 숄더프레스 3×10, 컬·삼두 2세트씩<br>\n      · <b>하체 A</b>: 스쿼트 4×6, 루마니안 데드 3×8, 레그 프레스 3×12, 카프 3×15<br>\n      · <b>상체 B</b>: OHP 4×6, 랫풀다운 4×10, 인클라인 덤벨 3×10<br>\n      · <b>하체 B</b>: 데드리프트 3×5, 불가리안 3×10, 레그 컬 3×12<br><br>\n      메인 리프트만 RPE 코치 규칙(7~8 유지)을 그대로 적용하세요."}],STRENGTH_THEORY=[{id:"hypertrophy",name:"근육은 어떻게 크나",what:"세트 수가 깡패라는 결론까지",theory:"주당 세트 수와 근성장의 용량-반응 관계(Pelland & Robinson 2024 메가분석). 실패까지는 불필요(0~2회 여유면 충분)",body:"복잡한 이론을 걷어내면 셋만 남아요.<br><br>\n      · <b>볼륨</b>: 부위당 주 10세트 근처가 가성비 구간. 더 늘리면 더 크지만 완만해져요<br>\n      · <b>강도</b>: 한 세트를 <b>실패 2~3회 전</b>까지. 매번 한계는 피로만 쌓아요<br>\n      · <b>빈도</b>: 같은 볼륨이면 주 1회든 3회든 비슷해요. 나누면 회당 부담이 줄 뿐<br><br>\n      Madcow도, 덤벨 풀바디도 결국 이 세 변수의 다른 배합이에요."},{id:"aging",name:"나이 들수록 근력",what:"주 30~60분이 수명을 바꾸는 근거",theory:"주 30~60분 근력 운동만으로 사망 위험 10~17% 감소(Momma 2022 BJSM, 메타분석). 근육은 노후 연금이에요",body:"30대 중반부터 근육은 매년 조금씩 줄어요. 가만히 두면요.<br><br>\n      · 권장량은 생각보다 작아요: <b>주 2회, 합쳐서 30~60분</b><br>\n      · 더 한다고 더 좋아지진 않았어요. 과욕보다 꾸준함의 영역<br>\n      · 계단이 무서워지는 순서: 근력 → 균형 → 자신감. 역순으로 지키면 됩니다<br><br>\n      이 앱의 일상 미션과 발목 밸런스 코스가 그 역순 설계예요."},{id:"women",name:"벌크업이라는 오해",what:"근육이 커지는 속도의 사실들",theory:"체중 대비 근력 성장률은 성별 차이가 없어요. 여성 파워리프팅 참여율은 수년 새 18%에서 31%로",body:'근력 운동을 시작할 때 가장 자주 듣는 질문이 "우락부락해지지 않나요?"예요. 사실은 이래요.<br><br>\n      · 근육이 눈에 띄게 커지려면 수년의 의도적 훈련과 식단이 필요해요. <b>우연히 커지는 일은 없습니다</b><br>\n      · 훈련 원리는 모두에게 같아요. 성별 전용 프로그램이라는 건 마케팅에 가깝고요<br>\n      · 시작 무게가 빈 봉이든 덤벨이든, 체중 대비 비율로 보면 성장 속도는 동등해요<br><br>\n      그래서 3대 클럽 등급이 절대 무게가 아니라 체중 대비인 거예요. 기준은 언제나 어제의 나.'},{id:"recovery",name:"회복이 훈련이다",what:"쉬는 날 근육이 큰다는 말의 실체",theory:"근성장은 세션 사이 48시간에 일어나요. 디로드는 달력보다 신호 기반이 우위(Coleman 2024 RCT)",body:"훈련은 자극이고, 성장은 회복이 만들어요.<br><br>\n      · 같은 부위는 <b>48시간 간격</b>. 세션 사이에 하루는 쉬세요<br>\n      · 잠이 부족한 주는 무게 욕심을 내려놓으세요. RPE가 알아서 올라갈 거예요<br>\n      · 디로드(가벼운 주)는 4주마다 자동이 아니라 <b>신호가 올 때</b>: 같은 무게가 무거워지고, 잠이 얕아지고, 하기 싫어질 때<br><br>\n      RPE 코치가 그 신호를 숫자로 잡아주는 장치예요."}];function openStrengthTheory(W){const e=STRENGTH_THEORY.find(e=>e.id===W);e&&(hasPro("stheory:"+W)?(track("strength_theory",{id:W}),openModal(`\n    <button class="mclose" onclick="closeModal()">×</button>\n    <h3>${e.name}</h3>\n    <p class="sub" style="margin:6px 0 12px">${ic("check",12,"vertical-align:-1.5px;color:var(--primary)")} ${e.theory}</p>\n    <div style="font-size:13.5px;line-height:1.75">${e.body}</div>`)):openPro("stheory:"+W))}function strengthTheorySection(){const W=STRENGTH_THEORY.filter(W=>proShown("stheory:"+W.id));return W.length?`<div class="card">\n    <div class="card-title">고급 과정 (근력 이론) ${isPro()?'<span class="chip">전부 열림</span>':`<span class="chip">${ic("lock",10,"vertical-align:-1px")} 초대</span>`}</div>\n    <p class="sub" style="margin:0 0 6px;font-size:12.5px">파워리프팅 밖의 근력 과학이에요. 근비대, 노화, 오해, 회복.</p>\n    ${W.map(W=> 햄스트링 당기기","누운 4자 둔근 스트레칭","하프닐링 고관절 스트레칭","벽 가슴 펴기"]},{id:"yin",pro:!0,noise:"무음",space:"매트와 벽",attrs:{flex:4},name:"인 요가 회복",icon:"moon",level:"전체",quiet:!0,work:150,rest:30,rounds:1,desc:"한 자세를 2~3분씩, 고강도 다음 날의 회복이에요. 호흡은 길게.",theory:"16주 요가 RCT에서 균형 +5.4초·유연성 개선. 표본은 작지만 회복용으로는 충분한 근거예요",moves:["차일드 포즈","벽에 다리 올리기","비둘기 자세 (좌)","비둘기 자세 (우)","누운 나비 자세","시체 자세 호흡"]},{id:"pushup-ladder",pro:!0,noise:"무음",space:"매트 한 장",attrs:{upper:4,core:1},name:"PCPT 푸시업 사다리",icon:"zap",level:"전체",quiet:!0,work:40,rest:90,rounds:3,desc:"무릎, 표준, 다이아몬드, 발 높임, 아처 순서의 6단계 사다리예요. 한 단계에서 12회가 깔끔하면 승급.",theory:"푸시업 진행만으로 벤치프레스와 동등한 근력·가슴 두께 향상(Kotarsky 2018, JSCR)",moves:["푸시업 (현 단계, 실패 1~2회 전 정지)","푸시업 (하단 홀드)"]},{id:"lst-tempo",pro:!0,noise:"무음",space:"매트 한 장",attrs:{legs:3,upper:2,core:1},name:"LST 슬로우 전신",icon:"timer",level:"중급",quiet:!0,work:60,rest:60,rounds:3,desc:"3초 내려가고 3초 올라오고, 관절은 끝까지 펴지 않아요. 느려서 조용한데 고강도급.",theory:"슬로우 템포 저강도가 고중량과 동등한 근비대(Tanimoto & Ishii 2006, 도쿄대 12주 연구)",moves:["템포 스쿼트 (3초씩, 무릎 잠금 없이)","푸시업 (3초씩, 팔꿈치 잠금 없이)","리버스 런지 (3초 템포)","글루트 브리지 (정점에서 안 쉬기)"]},{id:"wallsit-bp",pro:!0,noise:"무음",space:"벽 앞 반 평",attrs:{legs:4},name:"월싯 4×2분 (혈압 루틴)",icon:"shield",level:"전체",quiet:!0,work:120,rest:120,rounds:4,desc:"벽 하나로 하는 임상 등급 운동이에요. 2분을 간신히 버틸 깊이로, 호흡은 절대 참지 말고.",theory:"등척성 운동이 혈압 강하 1위, 그중 월싯이 최상위(Edwards 2023 BJSM, 270개 RCT 네트워크 메타분석)",moves:["벽 기대 앉기 (2분 홀드)"]},{id:"single-leg",pro:!0,noise:"발소리",space:"소파 옆",attrs:{legs:4,bal:2},name:"피스톨 로드맵",icon:"dumbbell",level:"중급~고급",quiet:!0,work:45,rest:60,rounds:3,desc:"한 다리에 체중을 모는 게 맨몸의 중량 추가예요. 불가리안에서 시작해 피스톨까지.",theory:"불가리안 스플릿 스쿼트가 바벨 스쿼트와 동등한 하지 근력 향상(Speirs 2016, JSCR)",moves:["불가리안 스플릿 스쿼트 (좌, 뒷발 소파)","불가리안 스플릿 스쿼트 (우)","박스 피스톨 하강 (좌우 교대)","글루트 브리지 (한 다리 교대)"]},{id:"ankle-reboot",pro:!0,noise:"무음",space:"벽 옆 한 걸음",attrs:{bal:4,legs:1},name:"발목 밸런스 리부트",icon:"target",level:"전체",quiet:!0,work:30,rest:15,rounds:3,desc:"접질린 발목은 1년간 재부상 위험이 2배예요. 수건 한 장이 밸런스보드를 대신해요.",theory:"가정 밸런스 훈련만으로 발목 염좌 재발 35% 감소(Hupperets 2009 BMJ, 522명 RCT)",moves:["외다리 밸런스 (좌)","외다리 밸런스 (우)","외다리 밸런스 (눈 감고, 벽 옆)","외다리 밸런스 (수건 위, 고개 돌리기)"]},{id:"knee-prehab",pro:!0,noise:"무음",space:"현관 단차",attrs:{legs:3,bal:1},name:"무릎 앞 통증 프리햅",icon:"shield",level:"전체",quiet:!0,work:40,rest:20,rounds:3,desc:"계단에서 무릎 앞이 아픈 사람의 표준 루틴. 통증 3/10 이하, 다음날 악화 없음이 진행 규칙이에요.",theory:"엉덩이+무릎 결합 강화가 무릎 단독 강화보다 우월(Nascimento 2018 JOSPT 메타분석)",moves:["옆으로 누워 다리 들기","클램셸","의자 스쿼트 (3초 하강)","스텝다운 (현관 단차)","글루트 브리지"]},{id:"shoulder-zero",pro:!0,noise:"무음",space:"문틀 앞",attrs:{upper:4},name:"어깨 프리햅 (밴드 제로)",icon:"shield",level:"전체",quiet:!0,work:30,rest:20,rounds:2,desc:"문틀과 수건만으로 로테이터 커프와 견갑을 잡아요. 벤치프레스·배드민턴 인구 필수.",theory:"외회전 근력과 견갑 안정화가 어깨 부상 3대 교정 인자(Cools 2015 BJSM, OSTRC 프로그램 부상 28% 감소)",moves:["문틀 외회전 푸시 (좌)","문틀 외회전 푸시 (우)","옆으로 누워 외회전 (수건 끼움)","YTW 레이즈 (Y는 2초 홀드)","벽 천사 (월 엔젤)","슬리퍼 스트레치 (좌우)"]},{id:"gibala10",pro:!0,noise:"발소리",space:"거실 두 평",attrs:{endur:4,legs:2},name:"기발라 1분 인터벌",icon:"flame",level:"중급~고급",quiet:!0,work:60,rest:60,rounds:2,hard:!0,desc:"점프 없이 심박 85~90%를 만들어요. 아래층은 모르고 심장만 아는 인터벌.",theory:"1분 고강도 ×10회가 전통 지구력 훈련과 유사한 심폐 적응(Gibala, 맥마스터대). 충격과 강도는 별개예요",moves:["마칭 하이니 (전력 템포)","스피드 스쿼트","스탠딩 마운틴 클라이머","사이드 스텝 터치","스텝백 버피"]},{id:"stair-engine",pro:!0,noise:"계단",space:"비상계단",attrs:{endur:4,legs:3},name:"계단 심폐 엔진",icon:"stairs",level:"중급",stair:!0,work:60,rest:120,rounds:5,desc:"오르기 1분, 회복 2분을 5번. 내려올 땐 엘리베이터로 무릎을 아껴요.",theory:"8주 계단 오르기로 VO2max +17%(좌식 여성 RCT). 진행은 층수, 속도, 백팩 순서로",moves:["계단 오르기 (숨이 차게 4분)"]},{id:"cars-morning",pro:!0,noise:"무음",space:"한 평",attrs:{flex:4,bal:1},name:"CARs 아침 관절 점검",icon:"sun",level:"전체",quiet:!0,work:45,rest:15,rounds:1,desc:"아침 8분, 모든 관절을 가장 큰 원으로 천천히 돌리며 오늘의 몸 상태를 점검해요.",theory:"FRC의 능동 가동범위 유지법(Spina). 솔직히 말하면 RCT는 아직 적고, 기전과 기관 채택이 근거예요",moves:["목 CARs","어깨 CARs (좌)","어깨 CARs (우)","척추 CARs","고관절 CARs (좌)","고관절 CARs (우)","발목 CARs (좌우)"]},{id:"yielding-iso",pro:!0,noise:"무음",space:"매트 한 장",attrs:{legs:3,upper:2,core:1},name:"최저점 버티기 (등척성)",icon:"timer",level:"중급",quiet:!0,work:30,rest:60,rounds:3,desc:"동작의 가장 힘든 지점에서 멈춰 버텨요. 반동도 착지음도 없는 심야용 고강도.",theory:"긴 근길이 고강도 등척성 홀드의 근비대·건 강화 효과(Oranchuk 2019 리뷰)",moves:["푸시업 (하단 버티기)","스쿼트 (하단 버티기)","런지 (하단 버티기, 좌)","런지 (하단 버티기, 우)"]},{id:"mcgill",pro:!0,noise:"무음",space:"매트 한 장",attrs:{core:4},name:"맥길 빅3 (허리 루틴)",icon:"target",level:"전체",quiet:!0,work:30,rest:15,rounds:3,desc:"요통 예방과 재활 연구의 표준 코어 루틴이에요. 허리를 굽히지 않고 단련해요.",theory:"맥길의 빅3. 홀드는 8~10초 고정, 진행은 5-3-1 피라미드의 반복 수로. 기상 직후 1시간은 피하세요",moves:["맥길 컬업","사이드 플랭크 (좌)","사이드 플랭크 (우)","버드독"]},{id:"norway4",pro:!0,noise:"계단",space:"비상계단",attrs:{endur:5},name:"노르웨이식 4×4 인터벌",icon:"flame",level:"중급~고급",stair:!0,work:240,rest:180,rounds:4,hard:!0,desc:"4분 힘들게, 3분 회복을 4번. 심폐지구력(VO2max)을 끌어올리는 가장 검증된 방법이에요.",theory:"Helgerud(2007)의 4×4. 처음엔 4×3분이나 85% 강도로 시작해도 돼요. 주 2~3회까지만",moves:["계단 오르기 (숨이 차게 4분)"]},{id:"copenhagen",pro:!0,noise:"무음",space:"소파 옆",attrs:{legs:3,core:2},name:"코펜하겐 프로토콜",icon:"shield",level:"중급",quiet:!0,work:30,rest:20,rounds:2,desc:"사타구니와 안쪽 허벅지를 강화해요. 축구하다 삐끗하는 그 부위요.",theory:"코펜하겐 내전근 운동(Harøy 2019). 바쁠 땐 주 1회 1세트 유지 모드도 원설계에 있어요",moves:["코펜하겐 플랭크 (무릎, 좌)","코펜하겐 플랭크 (무릎, 우)","와이드 스쿼트","글루트 브리지 (한 다리 교대)"]},{id:"nordic",pro:!0,noise:"무음",space:"소파 앞",attrs:{legs:4},name:"노르딕 컬 (소파 버전)",icon:"dumbbell",level:"중급~고급",quiet:!0,work:40,rest:30,rounds:2,desc:"소파에 발을 끼우고 햄스트링을 단련해요. 천천히 버티며 내려가는 게 전부예요.",theory:"햄스트링 부상 감소 메타분석(van Dyk 2019)의 그 운동. 효과 크기엔 반론(Impellizzeri 2021)도 있지만 방향은 일치해요",moves:["노르딕 컬 (소파에 발 고정)","굿모닝","글루트 브리지 (한 다리 교대)"]},{id:"tabata",noise:"발소리",space:"매트 한 장",attrs:{endur:3,legs:2},name:"20-10 인터벌 4분",icon:"flame",level:"고급",quiet:!0,work:20,rest:10,rounds:2,hard:!0,desc:"20초 전력 + 10초 휴식 ×8. 점프 없이도 충분히 타요.",theory:"20초 전력·10초 휴식 구조. 원조 타바타(1996)는 초최대 강도 전용이라, 이름은 정직하게 뗐어요",moves:["스텝백 버피","스피드 스쿼트","마운틴 클라이머 (천천히)","마칭 하이니 (빠르게)"]},{id:"tabata2",pro:!0,noise:"발소리",space:"매트 한 장",attrs:{endur:4,legs:3},name:"20-10 더블 8분",icon:"flame",level:"고급+",quiet:!0,work:20,rest:10,rounds:4,hard:!0,desc:"20-10 두 블록을 연달아, 16인터벌. 끝나면 다리가 후들거려요.",moves:["스텝백 버피","스피드 스쿼트","마운틴 클라이머 (천천히)","사이드 스텝 터치"]},{id:"hiit",pro:!0,noise:"발소리",space:"거실 두 평",attrs:{endur:4,legs:3,upper:2},name:"HIIT 풀버닝",icon:"flame",level:"고급",quiet:!0,work:40,rest:20,rounds:2,hard:!0,desc:"40초 강하게 + 20초 휴식, 2라운드 16분. 전부 저소음 동작이에요.",moves:["스텝백 버피","스피드 스쿼트","푸시업","리버스 런지 (빠르게 교대)","마운틴 클라이머 (천천히)","플랭크 스텝 잭","마칭 하이니 (빠르게)","사이드 스텝 터치"]},{id:"stair1",noise:"계단",space:"비상계단",attrs:{legs:3,endur:3},name:"계단 인터벌",icon:"stairs",level:"초급~중급",stair:!0,work:60,rest:60,rounds:5,desc:"오르기 1분, 회복 1분을 5번 반복해요. 내려올 땐 무릎을 위해 천천히.",moves:["계단 오르기 (빠르게)"]},{id:"stair2",pro:!0,noise:"계단",space:"비상계단",attrs:{legs:4,endur:3,bal:1},name:"계단 파워",icon:"stairs",level:"중급~고급",stair:!0,work:45,rest:75,rounds:3,desc:"2칸씩 오르기와 사이드 스텝으로 둔근을 채워요. 손잡이 잡고 안전하게.",moves:["계단 2칸씩 오르기","계단 사이드 스텝 (좌우 교대)"]},{id:"silent",noise:"무음",space:"매트 한 장",attrs:{legs:3,core:2,endur:2},name:"무소음 고강도",icon:"zap",level:"중급~고급",quiet:!0,work:40,rest:10,rounds:2,hard:!0,desc:"점프 없이 템포를 느리게, 자극은 깊게. 밤에도 할 수 있어요.",moves:["템포 스쿼트 (3초 하강)","푸시업 (3초 하강)","리버스 런지 (좌우 교대)","벽 기대 앉기","플랭크 숄더 탭","글루트 브리지 행진","사이드 플랭크 힙딥 (좌우 교대)","슈퍼맨 홀드"]}],MOVE_DB={"점핑잭":{cue:"무릎을 살짝 굽혀 발소리 없이 착지"},"스텝 잭":{cue:"점핑잭에서 점프만 뺀 버전 · 한 발씩 옆으로 디디며 팔은 만세",q:"스텝잭 저소음 운동"},"캣카우":{cue:"숨 마시며 가슴 열고, 내쉬며 등 둥글게. 허리만 꺾지 않기",q:"캣카우 스트레칭"},"제자리 가볍게 걷기":{cue:"팔 흔들며 가볍게. 잠 깨우는 속도면 충분해요"},"턱 당기기":{cue:"뒤통수를 뒤로 민다는 느낌으로 이중턱 만들기. 5초 유지",q:"턱 당기기 운동"},"상부 등 비틀기":{cue:"의자에 앉아 등받이 잡고 가슴부터 회전. 허리는 따라가지 않기",q:"흉추 회전 스트레칭"},"발목 펌프":{cue:"앉아서 발끝을 몸쪽으로 당겼다 멀리 밀기. 종아리 펌핑",q:"발목 펌프 운동"},"벽에 다리 올리기":{cue:"엉덩이를 벽에 붙이고 다리를 벽에. 3분까지 편하게",q:"벽에 다리 올리기"},"월드 그레이티스트 스트레칭":{cue:"런지 자세에서 같은 쪽 팔꿈치를 바닥으로, 반대팔은 하늘로",q:"월드 그레이티스트 스트레칭"},"고관절 90/90 전환":{cue:"양 무릎 90도로 앉아 좌우로 천천히 전환. 손 짚어도 돼요",q:"90/90 고관절"},"발목 무릎 터치":{cue:"벽 앞에서 무릎을 벽에 닿게. 뒤꿈치는 바닥에 고정",q:"발목 가동성 운동"},"흉추 회전":{cue:"옆으로 누워 위쪽 팔을 크게 반원으로. 시선은 손끝 따라",q:"흉추 회전 운동"},"딥 스쿼트 홀드":{cue:"최대한 깊게 앉아 버티기. 발뒤꿈치 들리면 폭을 넓히기",q:"딥스쿼트 홀드"},"벽 천사":{cue:"등과 팔을 벽에 붙인 채 만세를 올렸다 내리기. 허리 뜨지 않게",q:"월엔젤 운동"},"YTW 레이즈":{cue:"엎드려 팔로 Y, T, W 모양. 어깨 으쓱하지 않기",q:"YTW 레이즈"},"밴드 없이 풀어파트":{cue:"팔을 앞으로 모았다 옆으로 활짝. 날개뼈를 모은다는 느낌",q:"밴드 풀어파트"},"수건 햄스트링 당기기":{cue:"누워서 발바닥에 수건 걸고 다리를 천장으로. 무릎 살짝 굽혀도 돼요",q:"수건 햄스트링 스트레칭"},"누운 4자 둔근 스트레칭":{cue:"누워서 발목을 반대 무릎에 올려 4자 모양, 허벅지를 가슴쪽으로",q:"4자 스트레칭"},"하프닐링 고관절 스트레칭":{cue:"한쪽 무릎 꿇은 런지 자세에서 엉덩이를 조이고 골반을 앞으로",q:"장요근 스트레칭"},"차일드 포즈":{cue:"무릎 꿇고 엉덩이를 뒤꿈치에, 팔은 앞으로 멀리. 이마는 바닥에",q:"차일드 포즈"},"비둘기 자세":{cue:"한 다리는 앞에 접고 뒷다리는 뒤로 길게. 엉덩이 바깥이 늘어나는 느낌",q:"비둘기 자세 요가"},"누운 나비 자세":{cue:"누워서 발바닥끼리 붙이고 무릎을 양옆으로 떨어뜨려요. 중력에 맡기기",q:"누운 나비 자세"},"시체 자세 호흡":{cue:"대자로 누워 4초 들이쉬고 6초 내쉬기. 몸 어디에도 힘이 없게",q:"사바아사나"},"불가리안 스플릿 스쿼트":{cue:"뒷발등을 소파에 올리고 앞다리로만. 상체는 살짝 숙여도 돼요",q:"불가리안 스플릿 스쿼트"},"박스 피스톨 하강":{cue:"한 다리로 소파에 3초 걸려 앉기. 일어설 땐 양다리도 괜찮아요",q:"피스톨 스쿼트 단계"},"외다리 밸런스":{cue:"시선은 정면 고정, 흔들리는 발목이 일하는 중. 넘어질 곳 옆에서",q:"외다리 밸런스 운동"},"옆으로 누워 다리 들기":{cue:"몸은 일직선, 다리를 천장으로 천천히. 골반이 뒤로 눕지 않게",q:"사이드 레그 레이즈"},"클램셸":{cue:"옆으로 누워 무릎 90도, 발뒤꿈치 붙인 채 무릎만 조개처럼 열기",q:"클램셸 운동"},"의자 스쿼트":{cue:"의자에 3초 걸려 앉았다가 일어나기. 무릎이 안쪽으로 무너지지 않게",q:"의자 스쿼트"},"스텝다운":{cue:"단차 위 한 다리로 서서 반대 뒤꿈치를 바닥에 살짝 터치 후 복귀",q:"스텝다운 운동"},"문틀 외회전 푸시":{cue:"팔꿈치 90도로 몸에 붙이고 손등으로 문틀을 5초 밀기. 어깨 으쓱 금지",q:"등척성 외회전 운동"},"옆으로 누워 외회전":{cue:"수건을 겨드랑이에 끼우고 아래팔만 천장 쪽으로 회전",q:"사이드라잉 외회전"},"슬리퍼 스트레치":{cue:"옆으로 누워 팔꿈치 90도, 반대 손으로 손목을 지그시 바닥 쪽으로",q:"슬리퍼 스트레치"},"스탠딩 마운틴 클라이머":{cue:"선 채로 무릎과 반대 팔꿈치를 빠르게 교차 터치",q:"스탠딩 마운틴클라이머"},"목 CARs":{cue:"목으로 가장 큰 원을 10초에 한 바퀴. 아픈 각도는 작게 우회",q:"목 CARs"},"어깨 CARs":{cue:"팔을 귀 옆까지 올려 가장 큰 원. 몸통은 긴장시켜 보상 차단",q:"숄더 CARs"},"척추 CARs":{cue:"골반 고정하고 등뼈만 둥글게-펴기-회전. 천천히가 전부",q:"척추 CARs"},"고관절 CARs":{cue:"무릎을 들어 바깥으로 크게 원. 의자나 벽 잡고 해도 돼요",q:"힙 CARs"},"발목 CARs":{cue:"앉아서 발끝으로 가장 큰 원을 천천히. 좌우 10초씩",q:"발목 가동성 운동"},"맥길 컬업":{cue:"한쪽 무릎만 세우고 손은 허리 아래 받치기. 목이 아니라 가슴을 1cm만 들기",q:"맥길 컬업"},"코펜하겐 플랭크":{cue:"의자나 소파에 위쪽 다리 무릎을 올리고 옆으로 버텨요. 안쪽 허벅지가 일하는 느낌",q:"코펜하겐 플랭크"},"노르딕 컬":{cue:"무릎 꿇고 발등을 소파 밑에 고정. 최대한 천천히 앞으로, 손으로 받아도 성공이에요",q:"노르딕 햄스트링 컬"},"계단 오르기 (숨이 차게 4분)":{cue:"말은 가능하지만 노래는 못 부를 강도로 꾸준히. 내려올 땐 회복",q:"계단
